version: '3.8'

services:
  app:
    image: php:8.2-fpm
    container_name: agency_app
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - db
      - redis
    networks:
      - agency_network

  nginx:
    image: nginx:alpine
    container_name: agency_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - agency_network

  db:
    image: mysql:8.0
    container_name: agency_db
    environment:
      MYSQL_DATABASE: agency_system
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: agency
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - agency_network

  redis:
    image: redis:7-alpine
    container_name: agency_redis
    ports:
      - "6379:6379"
    networks:
      - agency_network

  queue:
    image: php:8.2-fpm
    container_name: agency_queue
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: php artisan queue:work --tries=4 --sleep=3
    depends_on:
      - db
      - redis
    networks:
      - agency_network

networks:
  agency_network:
    driver: bridge

volumes:
  db_data:
